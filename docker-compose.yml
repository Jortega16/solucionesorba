services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL:-jortega@solucionesorba.com}
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.local
    environment:
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL:-onboarding@resend.dev}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:-jortega@solucionesorba.com}
    restart: unless-stopped
